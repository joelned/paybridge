groups:
  - name: paybridge-api-alerts
    rules:
      - alert: PayBridgeApiHigh5xxRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          service: paybridge-backend
        annotations:
          summary: "PayBridge 5xx error rate is above 5%"
          description: "HTTP 5xx ratio has exceeded 5% for 5 minutes."

      - alert: PayBridgeApiHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_server_requests_seconds_bucket[5m])) by (le)
          ) > 1.5
        for: 10m
        labels:
          severity: warning
          service: paybridge-backend
        annotations:
          summary: "PayBridge p95 latency is high"
          description: "HTTP p95 latency is above 1.5 seconds for 10 minutes."

      - alert: PayBridgeApiInstanceDown
        expr: up{job="paybridge-backend"} == 0
        for: 2m
        labels:
          severity: critical
          service: paybridge-backend
        annotations:
          summary: "PayBridge instance is down"
          description: "Prometheus cannot scrape PayBridge target for 2 minutes."

      - alert: PayBridgeJvmHighMemory
        expr: |
          (
            jvm_memory_used_bytes{area="heap"}
            /
            jvm_memory_max_bytes{area="heap"}
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          service: paybridge-backend
        annotations:
          summary: "PayBridge JVM heap usage is high"
          description: "Heap usage above 85% for 10 minutes."
