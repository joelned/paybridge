# --------- Production Runtime ----------
spring.jpa.open-in-view=false
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# --------- CORS: set CORS_ALLOWED_ORIGINS in env (e.g. https://app.paybridge.com) ----------
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ---------DATABASE CREDENTIALS -------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:paybridge}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

#---------REDIS CREDENTIALS------------------------------------------------------------------
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master-neon.xml

#----------RSA KEY CONFIGURATION-------------------------------------------------------------
rsa.private-key-path=${RSA_PRIVATE_KEY}
rsa.public-key-path=${RSA_PUBLIC_KEY}


# --------- OpenAPI / Swagger: disabled in prod; use exported spec for partner docs ----------
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

#------------SPRING MAIL CONFIGURATION -------------------------------------------------------
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.cloud.vault.uri=http://172.236.24.205:8200
spring.cloud.vault.token=${VAULT_TOKEN}

# --------- Actuator / Monitoring ----------
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# --------- Logging ----------
logging.level.root=INFO
logging.level.com.paybridge=INFO
logging.pattern.level=%5p [trace=%X{traceId:-},span=%X{spanId:-}]


spring.profiles.include=smtp,vault